<!-- Definicja komendy -->
<command>
  <name>firewall-drop</name>
  <executable>firewall-drop</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>

<!-- Active Response: blokuj po brute-force SSH -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>5763</rules_id>
  <timeout>600</timeout>
  <repeated_offenders>60,120,360,1440</repeated_offenders>
</active-response>

<!-- Active Response: blokuj po wykryciu ransomware -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100200</rules_id>
  <timeout>0</timeout> <!-- permanent -->
</active-response>
