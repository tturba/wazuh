<!-- Windows Security Events (logowanie, konta, eskalacja) -->
<localfile>
  <location>Security</location>
  <log_format>eventchannel</log_format>
  <query>Event/System[EventID=4624 or EventID=4625
    or EventID=4648 or EventID=4672
    or EventID=4720 or EventID=4732
    or EventID=4740 or EventID=4756
    or EventID=1102]</query>
</localfile>

<!-- Sysmon — kluczowy dla zaawansowanej detekcji -->
<localfile>
  <location>Microsoft-Windows-Sysmon/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- PowerShell Script Block Logging -->
<localfile>
  <location>Microsoft-Windows-PowerShell/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- Windows Defender -->
<localfile>
  <location>Microsoft-Windows-Windows Defender/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>
