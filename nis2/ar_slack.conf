#!/bin/bash
# /var/ossec/active-response/bin/slack-notify.sh
# NIS2 Art.21(2)(b) — natychmiastowe powiadomienie o incydencie
# Chmod: chmod 750 /var/ossec/active-response/bin/slack-notify.sh
# Chown: chown root:wazuh /var/ossec/active-response/bin/slack-notify.sh

LOCAL=$(dirname $0)
ALERT_FILE=$1
WEBHOOK="https://hooks.slack.com/services/TXXXXX/BXXXXX/xxxxxxxxxxxxx"

# Parse alert JSON
ALERT_MSG=$(cat "$ALERT_FILE" | jq -r '
  "🚨 *WAZUH ALERT — NIS2 INCIDENT*\n" +
  "━━━━━━━━━━━━━━━━━━━━\n" +
  "Rule: " + .parameters.alert.rule.description + "\n" +
  "Level: " + (.parameters.alert.rule.level|tostring) + "/15\n" +
  "Agent: " + .parameters.alert.agent.name + " (" + .parameters.alert.agent.ip + ")\n" +
  "SrcIP: " + (.parameters.alert.data.srcip // "N/A") + "\n" +
  "MITRE: " + ((.parameters.alert.rule.mitre.id // ["N/A"]) | join(", ")) + "\n" +
  "Time: " + .parameters.alert.timestamp + "\n" +
  "━━━━━━━━━━━━━━━━━━━━\n" +
  "⚠ Sprawdź w Wazuh Dashboard i oceń czy wymaga zgłoszenia S46 (24h)"
')

curl -s -X POST "$WEBHOOK" \
  -H 'Content-type: application/json' \
  -d "{\"text\": \"$ALERT_MSG\"}"

exit 0;
