<!-- Integracja z systemem ticketowym dla incydentów NIS2 -->
<integration>
  <name>custom-s46-webhook</name>
  <hook_url>https://soc-internal.example.com/api/incident/create</hook_url>
  <level>12</level>
  <group>nis2_art21b,attack,credential_dump,ransomware</group>
  <alert_format>json</alert_format>
</integration>

<!-- Integracja ze Slackiem -->
<integration>
  <name>slack</name>
  <hook_url>https://hooks.slack.com/services/TXXXXX/BXXXXX/xxxxxxxxxxxxx</hook_url>
  <level>10</level>
  <alert_format>json</alert_format>
</integration>

<!-- Integracja z TheHive (SOAR) -->
<integration>
  <name>custom-thehive</name>
  <hook_url>https://thehive.internal:9000/api/alert</hook_url>
  <level>12</level>
  <alert_format>json</alert_format>
  <api_key>YOUR_THEHIVE_API_KEY</api_key>
</integration>
